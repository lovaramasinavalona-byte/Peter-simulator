<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwiftSim Elite 🚀 - Mobile Edition</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #f0f2f5; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Barre de KPI Compacte */
        .kpi-bar { 
            background: #1a252f; 
            color: white; 
            padding: 8px 5px; 
            display: flex; 
            justify-content: space-around; 
            font-size: 0.75em; 
            border-bottom: 2px solid var(--accent); 
        }
        .kpi-value { display: block; font-size: 1.1em; font-weight: bold; color: var(--warning); text-align: center; }

        header { 
            background: var(--primary); 
            color: white; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            align-items: center;
        }

        /* Conteneur Principal avec gestion des onglets */
        main { flex-grow: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        
        .tab-content { 
            display: none; 
            flex-direction: column; 
            height: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            overflow-y: auto;
        }
        .tab-content.active { display: flex; }

        .panel { 
            background: white; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #ddd; 
            height: 100%;
        }

        /* Chat Window spécifique Mobile */
        #chat-window { flex-grow: 1; padding: 12px; overflow-y: auto; background: white; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 85%; padding: 10px; border-radius: 12px; font-size: 0.9em; line-height: 1.4; }
        .msg.client { background: #eee; align-self: flex-start; border-left: 4px solid #ccc; }
        .msg.agent { background: var(--accent); color: white; align-self: flex-end; }
        .msg.system { background: #fff3cd; color: #856404; align-self: center; font-size: 0.75em; padding: 5px 12px; border-radius: 20px; text-align: center; }

        /* Zone de saisie adaptée aux pouces */
        .input-area { padding: 10px; border-top: 1px solid #eee; background: white; }
        textarea { 
            width: 100%; 
            height: 50px; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            resize: none; 
            box-sizing: border-box; 
            font-size: 16px; /* Empêche le zoom auto sur iOS */
        }
        .btn-send { 
            width: 100%; 
            margin-top: 8px; 
            background: var(--success); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
        }

        /* Processus & Hints */
        .step-item { padding: 8px; margin-bottom: 5px; border-radius: 5px; background: #f9f9f9; border-left: 3px solid #ccc; font-size: 0.8em; }
        .step-active { background: #e3f2fd; border-left-color: var(--accent); font-weight: bold; }
        .step-done { background: #e8f5e9; border-left-color: var(--success); opacity: 0.7; }
        .hint-box { background: #fff9c4; color: #7f8c0d; padding: 10px; border-radius: 5px; font-size: 0.85em; border: 1px solid #fbc02d; margin-top: 10px; }

        /* Barre de Navigation Mobile (Bottom Tabs) */
        .nav-tabs { 
            display: flex; 
            background: #1a252f; 
            border-top: 1px solid var(--accent); 
        }
        .tab-btn { 
            flex: 1; 
            padding: 15px 5px; 
            color: #95a5a6; 
            background: none; 
            border: none; 
            font-size: 0.7em; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        .tab-btn.active { color: white; background: var(--accent); }

        select { width: 100%; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="kpi-bar">
    <div class="kpi-item">DMT <span id="kpi-dmt" class="kpi-value">00:00</span></div>
    <div class="kpi-item">SLA <span id="kpi-sla" class="kpi-value">25s</span></div>
    <div class="kpi-item">CSAT <span id="kpi-csat" class="kpi-value">100%</span></div>
</div>

<header>
    <div style="font-size: 0.9em;"><strong>SwiftSim Elite 🚀 Mobile</strong></div>
    <div style="display:flex; gap:5px; width: 100%;">
        <select id="scenarioSelect" onchange="initApp()">
            <option value="fr_1">Cas 1: Neige A7</option>
            <option value="fr_2">Cas 2: Adresse Incomplète</option>
            <option value="fr_3">Cas 3: Relais Fermé</option>
            <option value="fr_4">Cas 4: Colis Endommagé</option>
            <option value="fr_9">Cas 9: Client Agressif</option>
            <option value="fr_10">Cas 10: Accident</option>
        </select>
        <button onclick="initApp()" style="white-space:nowrap; padding: 0 10px;">RESET</button>
    </div>
</header>

<main>
    <div id="tab-chat" class="tab-content active">
        <div class="panel">
            <div id="chat-window"></div>
            <div class="input-area">
                <textarea id="agentInput" placeholder="Votre réponse..."></textarea>
                <button class="btn-send" onclick="sendMessage()">ENVOYER</button>
            </div>
        </div>
    </div>

    <div id="tab-bo" class="tab-content">
        <div class="panel">
            <div style="padding:15px;">
                <input type="text" id="searchBO" placeholder="Rechercher nom/colis..." onkeyup="handleSearch()" style="width:100%; padding:12px; font-size:16px; border-radius:5px; border:1px solid #ccc;">
                <div id="boResults" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>

    <div id="tab-steps" class="tab-content">
        <div id="stepList"></div>
        <div id="hintContainer"></div>
    </div>
</main>

<nav class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab(event, 'tab-chat')">💬 Chat</button>
    <button class="tab-btn" onclick="switchTab(event, 'tab-bo')">🖥️ BO</button>
    <button class="tab-btn" onclick="switchTab(event, 'tab-steps')">📋 Étapes</button>
</nav>

<script>
// --- LOGIQUE DE NAVIGATION MOBILE ---
function switchTab(evt, tabName) {
    let contents = document.getElementsByClassName("tab-content");
    for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
    let btns = document.getElementsByClassName("tab-btn");
    for (let i = 0; i < btns.length; i++) btns[i].classList.remove("active");
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
}

// --- LOGIQUE SWIFTSIM (Reprise Intégrale de votre code) ---
const db = [
    { id: "SLX-44102", client: "Sarah El Mansouri", status: "Retenu", info: "Bloqué Hub Lyon. Raison : Fortes neiges A7. Reprise estimée sous 24h." },
    { id: "SLX-10022", client: "Marc Lefebvre", status: "Bloqué", info: "Adresse : 15 rue des Fleurs. Note : Code porte manquant." },
    { id: "SLX-88291", client: "Julie Morel", status: "Retour", info: "Point Relais fermé. Redirigé vers 'Relais Bleu'." },
    { id: "SLX-99999", client: "Jean-Luc", status: "Inconnu", info: "Aucune donnée de tracking." },
    { id: "SLX-66554", client: "Logistique", status: "Détruit", info: "Accident transporteur." }
];

const pokes = ["Vous êtes là ?", "J'attends...", "???", "Répondez moi svp."];

const scenarios = {
    fr_1: { client: "Sarah E.", intro: "Bonjour ! Mon colis SLX-44102 est bloqué ! C'est urgent !", steps: [
        { label: "1. Accueil & Empathie", keys: ["bonjour", "comprends", "navré", "aider"], hints: ["Saluez et montrez votre empathie."], reply: "C'est bien gentil, mais ça n'explique pas le retard..." },
        { label: "2. Mise en attente", keys: ["patienter", "vérifie", "attente"], hints: ["Demandez à vérifier le BO."], reply: "D'accord, je vous laisse regarder." },
        { label: "3. Diagnostic (Neige)", keys: ["neige", "météo", "lyon"], hints: ["Le colis est à Lyon, bloqué par la neige."], reply: "Et ça va durer longtemps ?" },
        { label: "4. Solution (24h)", keys: ["24h", "demain"], hints: ["Reprise sous 24h."], reply: "Bon, pas le choix alors." },
        { label: "5. Prise de congé", keys: ["disponible", "journée", "revoir"], hints: ["Formule de politesse standard."], reply: "Au revoir." }
    ]},
    fr_9: { client: "Jean-Luc", intro: "C'EST SCANDALEUX ! MON COLIS SLX-99999 ?", steps: [
        { label: "1. Désamorçage", keys: ["monsieur", "navré", "calme"], hints: ["Restez formel."], reply: "Je veux savoir où il est !" },
        { label: "2. Transparence", keys: ["vérifie", "incident", "visibilité"], hints: ["Expliquez le souci de tracking."], reply: "C'est pas possible !" }
    ]}
};

let currentStep = 0, dmtSeconds = 0, slaSeconds = 25, csat = 100, errorCount = 0;
let timerInterval, slaInterval, activeSc = null;

function initApp() {
    const scKey = document.getElementById('scenarioSelect').value;
    activeSc = scenarios[scKey] || scenarios.fr_1;
    currentStep = 0; dmtSeconds = 0; csat = 100; errorCount = 0;
    document.getElementById('chat-window').innerHTML = "";
    document.getElementById('hintContainer').innerHTML = "";
    addMsg(activeSc.client, activeSc.intro, 'client');
    updateSteps(); startTimers(); updateKPIs();
}

function startTimers() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        dmtSeconds++;
        document.getElementById('kpi-dmt').innerText = `${Math.floor(dmtSeconds/60).toString().padStart(2,'0')}:${(dmtSeconds%60).toString().padStart(2,'0')}`;
    }, 1000);
    resetSLA();
}

function resetSLA() {
    clearInterval(slaInterval);
    slaSeconds = 25;
    document.getElementById('kpi-sla').innerText = "25s";
    slaInterval = setInterval(() => {
        slaSeconds--;
        document.getElementById('kpi-sla').innerText = `${slaSeconds}s`;
        if(slaSeconds <= 0) {
            csat -= 5; updateKPIs();
            addMsg(activeSc.client, `<strong>${pokes[Math.floor(Math.random() * pokes.length)]}</strong>`, 'client');
            resetSLA();
        }
    }, 1000);
}

function updateKPIs() { document.getElementById('kpi-csat').innerText = `${Math.max(0, csat)}%`; }

function addMsg(sender, text, type) {
    const win = document.getElementById('chat-window');
    win.innerHTML += `<div class="msg ${type}"><strong>${sender}:</strong><br>${text}</div>`;
    win.scrollTop = win.scrollHeight;
}

function sendMessage() {
    const inputField = document.getElementById('agentInput');
    const input = inputField.value.toLowerCase();
    if(!input) return;
    addMsg("Agent", input, "agent");
    inputField.value = "";
    const step = activeSc.steps[currentStep];
    if(step.keys.some(k => input.includes(k))) {
        currentStep++; errorCount = 0;
        document.getElementById('hintContainer').innerHTML = "";
        setTimeout(() => {
            addMsg(activeSc.client, step.reply, "client");
            if(currentStep === activeSc.steps.length) {
                clearInterval(timerInterval); clearInterval(slaInterval);
                addMsg("SYSTEM", "🏆 MISSION RÉUSSIE !", "system");
            } else { updateSteps(); resetSLA(); }
        }, 800);
    } else {
        errorCount++; csat -= 2; updateKPIs();
        document.getElementById('hintContainer').innerHTML = `<div class="hint-box">💡 INDICE : ${step.hints[0]}</div>`;
    }
}

function updateSteps() {
    document.getElementById('stepList').innerHTML = activeSc.steps.map((s, i) => `
        <div class="step-item ${i === currentStep ? 'step-active' : (i < currentStep ? 'step-done' : '')}">
            ${i < currentStep ? '✅' : '👉'} ${s.label}
        </div>
    `).join('');
}

function handleSearch() {
    const val = document.getElementById('searchBO').value.toLowerCase();
    const res = document.getElementById('boResults');
    res.innerHTML = "";
    if(val.length < 2) return;
    db.filter(item => item.client.toLowerCase().includes(val) || item.id.toLowerCase().includes(val))
      .forEach(item => { res.innerHTML += `<div style="border:1px solid #ddd; padding:10px; margin-top:5px; border-left:4px solid var(--accent); background:white; font-size:0.85em;">
        <strong>${item.id}</strong><br>Statut: ${item.status}<br><small>${item.info}</small></div>`; });
}
window.onload = initApp;
</script>
</body>
</html>
