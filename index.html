<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwiftSim Elite 🚀 - Mobile Edition</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #f0f2f5; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow-x: hidden;
        }

        /* Barre KPI responsive */
        .kpi-bar { 
            background: #1a252f; 
            color: white; 
            padding: 10px; 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            text-align: center;
            font-size: 0.8em; 
            border-bottom: 3px solid var(--accent); 
        }
        .kpi-value { display: block; font-size: 1.1em; font-weight: bold; color: var(--warning); }

        header { 
            background: var(--primary); 
            color: white; 
            padding: 15px; 
            text-align: center;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        /* Layout Adaptatif */
        main { 
            display: flex;
            flex-direction: column; /* Mobile first */
            gap: 10px; 
            padding: 10px; 
            flex-grow: 1; 
            overflow-y: auto;
        }

        @media (min-width: 900px) {
            main { display: grid; grid-template-columns: 300px 1fr 300px; height: calc(100vh - 150px); }
        }

        .panel { 
            background: white; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #ddd;
            min-height: 200px;
        }

        .panel-header { background: #f8f9fa; padding: 12px; font-weight: bold; border-bottom: 1px solid #eee; font-size: 0.9em; }
        
        #chat-window { 
            flex-grow: 1; 
            padding: 15px; 
            overflow-y: auto; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            min-height: 300px;
        }

        .msg { max-width: 85%; padding: 12px; border-radius: 12px; font-size: 0.95em; line-height: 1.4; }
        .msg.client { background: #eee; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.agent { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.system { background: #fff3cd; color: #856404; align-self: center; font-size: 0.8em; border-radius: 20px; }

        .input-area { padding: 15px; border-top: 1px solid #eee; background: white; position: sticky; bottom: 0; }
        textarea { 
            width: 100%; 
            height: 80px; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            font-size: 16px; /* Évite le zoom auto sur iPhone */
            resize: none; 
            box-sizing: border-box; 
        }

        button { 
            width: 100%; 
            margin-top: 10px; 
            background: var(--success); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1em;
        }

        .step-item { padding: 10px; margin-bottom: 5px; border-radius: 6px; background: #f9f9f9; font-size: 0.85em; }
        .step-active { background: #e3f2fd; border-left: 4px solid var(--accent); font-weight: bold; }
        .hint-box { background: #fff9c4; padding: 12px; margin-top: 10px; border-radius: 6px; font-size: 0.85em; border: 1px solid #fbc02d; }
    </style>
</head>
<body>

<div class="kpi-bar">
    <div>DMT <span id="kpi-dmt" class="kpi-value">00:00</span></div>
    <div>SLA <span id="kpi-sla" class="kpi-value">25s</span></div>
    <div>CSAT <span id="kpi-csat" class="kpi-value">100%</span></div>
</div>

<header>
    <strong>SwiftSim Elite 🚀</strong>
    <div class="controls">
        <select id="scenarioSelect" onchange="initApp()" style="padding:10px; border-radius:5px;">
            <option value="fr_1">Sarah - Neige A7</option>
            <option value="fr_9">Jean-Luc - Agressif</option>
            <option value="fr_10">Logistique - Accident</option>
        </select>
        <button onclick="initApp()" style="background:var(--accent); padding:10px;">LANCER SESSION</button>
    </div>
</header>

<main>
    <section class="panel">
        <div class="panel-header">Recherche Colis (Back-Office)</div>
        <div style="padding:10px;">
            <input type="text" id="searchBO" placeholder="Saisir n° colis..." onkeyup="handleSearch()" style="width:100%; padding:12px; box-sizing:border-box; font-size:16px;">
            <div id="boResults"></div>
        </div>
    </section>

    <section class="panel">
        <div class="panel-header">Chat Client Direct</div>
        <div id="chat-window"></div>
        <div class="input-area">
            <textarea id="agentInput" placeholder="Répondez ici..."></textarea>
            <button onclick="sendMessage()">ENVOYER</button>
        </div>
    </section>

    <section class="panel">
        <div class="panel-header">Guide de Traitement</div>
        <div id="stepList" style="padding:10px;"></div>
        <div id="hintContainer" style="padding:10px;"></div>
    </section>
</main>

<script>
// (Ici, conservez exactement votre logique JavaScript précédente)
// Veillez à ce que les fonctions initApp, sendMessage, etc. soient copiées ici.
// Note : Le contenu du script reste identique à votre version PC.
</script>

</body>
</html>
